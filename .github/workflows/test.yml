name: Test and Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Go Tests
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Check out repository
      uses: actions/checkout@v4

    - name: 🐹 Set up Go environment
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: 🧪 Run tests
      run: go test -v ./...

  build:
    name: Compile Artifacts
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
    - name: 📥 Check out repository
      uses: actions/checkout@v4

    - name: 🐹 Set up Go environment
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: 🛠️ Build Compiled Binary Assets
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        BINARY_NAME=hobbydns-${{ matrix.goos }}-${{ matrix.goarch }}
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME="${BINARY_NAME}.exe"
        fi
        go build -o $BINARY_NAME

    - name: 📤 Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hobbydns-${{ matrix.goos }}-${{ matrix.goarch }}
        path: hobbydns-${{ matrix.goos }}-${{ matrix.goarch }}*
